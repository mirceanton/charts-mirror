---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Chart Builder

on:
  workflow_call:
    inputs:
      artifactName:
        type: string
        description: Name of the Published Chart
        required: true
      source:
        type: string
        description: Source block from metadata.yaml, as JSON
        required: true
      release:
        type: boolean
        description: Release
        required: true
    secrets:
      BOT_CLIENT_ID:
        required: false
      BOT_APP_PRIVATE_KEY:
        required: false
      DISCORD_WEBHOOK:
        required: false

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    outputs:
      app-exists: ${{ steps.app.outputs.exists }}
      source-type: ${{ steps.source.outputs.type }}
      version: ${{ steps.source.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false

      - name: Get Repository Name
        id: repository
        run: |
          echo "name=${GITHUB_REPOSITORY#*/}" >> $GITHUB_OUTPUT

      - name: Determine Source Type and Version
        id: source
        env:
          SOURCE: ${{ inputs.source }}
        run: |
          # The published OCI tag is always SemVer-clean (any leading "v" stripped).
          # The upstream fetch steps below re-read the verbatim source value so
          # `helm pull --version` and `git clone --branch` hit the real upstream ref.
          if jq -e 'has("helm")' <<< "$SOURCE" > /dev/null; then
            echo "type=helm" >> $GITHUB_OUTPUT
            echo "version=$(jq -r '.helm.version' <<< "$SOURCE" | sed 's/^v//')" >> $GITHUB_OUTPUT
          elif jq -e 'has("git")' <<< "$SOURCE" > /dev/null; then
            echo "type=git" >> $GITHUB_OUTPUT
            echo "version=$(jq -r '.git.tag' <<< "$SOURCE" | sed 's/^v//')" >> $GITHUB_OUTPUT
          else
            echo "::error::Source must define exactly one of: helm, git"
            exit 1
          fi

      - name: Check For Exising Chart
        uses: ./.github/actions/app-exists
        id: app
        with:
          app: ${{ steps.repository.outputs.name }}/${{ inputs.artifactName }}

  build:
    name: Build (${{ needs.plan.outputs.version }})
    runs-on: ubuntu-latest
    needs:
      - plan
    env:
      ARTIFACT_NAME: ${{ inputs.artifactName }}
      SOURCE: ${{ inputs.source }}
      VERSION: ${{ needs.plan.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          experimental: true
          install_args: --locked

      - if: ${{ inputs.release }}
        name: Login to GitHub Container Registry
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - if: ${{ needs.plan.outputs.source-type == 'helm' }}
        name: Fetch Helm Chart
        run: |
          registry=$(jq -r '.helm.registry' <<< "$SOURCE")
          chart=$(jq -r --arg fallback "$ARTIFACT_NAME" '.helm.chart // $fallback' <<< "$SOURCE")
          upstream_version=$(jq -r '.helm.version' <<< "$SOURCE")
          helm repo add upstream "$registry"
          helm repo update upstream
          helm pull "upstream/$chart" --version "$upstream_version" --untar --untardir ./src

      - if: ${{ needs.plan.outputs.source-type == 'git' }}
        name: Fetch Git Chart
        run: |
          repository=$(jq -r '.git.repository' <<< "$SOURCE")
          path=$(jq -r '.git.path' <<< "$SOURCE")
          tag=$(jq -r '.git.tag' <<< "$SOURCE")
          git clone --depth 1 --branch "$tag" "$repository" ./git-src
          mkdir -p ./src
          cp -r "./git-src/${path}" "./src/$(basename "$path")"

      - name: Override Chart Name
        run: |
          yq --inplace ".name = \"$ARTIFACT_NAME\"" ./src/*/Chart.yaml

      - name: Package Chart
        run: |
          mkdir -p dist
          helm package ./src/* --version "$VERSION" --destination ./dist

      - if: ${{ inputs.release }}
        name: Push Chart
        run: |
          helm push ./dist/*.tgz oci://ghcr.io/${{ github.repository }}

      - if: ${{ inputs.release }}
        name: Sign artifacts with Cosign
        run: |
          cosign sign --yes "ghcr.io/${{ github.repository }}/${ARTIFACT_NAME}:${VERSION}"

  release:
    if: ${{ inputs.release && needs.plan.outputs.app-exists != 'true' }}
    name: Release
    needs:
      - plan
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false

      - name: Get Repository Name
        id: repository
        run: |
          echo "name=${GITHUB_REPOSITORY#*/}" >> $GITHUB_OUTPUT

      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.BOT_CLIENT_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Get Release Tag
        uses: ./.github/actions/release-tag
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Create Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ steps.release.outputs.tag }}
          ARTIFACT_NAME: ${{ inputs.artifactName }}
          REPO_NAME: ${{ steps.repository.outputs.name }}
        run: |
          cat > release-notes.md <<EOF
          > [!NOTE]
          > A new chart has been added.

          ## 📦 Chart

          **Name**: [${ARTIFACT_NAME}](https://github.com/${{ github.repository }}/pkgs/container/${REPO_NAME}%2F${ARTIFACT_NAME})
          EOF
          gh release create "$TAG" --notes-file release-notes.md

  announce:
    if: ${{ inputs.release && !cancelled() }}
    needs:
      - plan
      - build
      - release
    name: Notify
    runs-on: ubuntu-latest
    steps:
      - if: ${{ contains(needs.*.result, 'failure') }}
        name: Send Discord Webhook
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1.16.0
        with:
          color: "0xFF0000"
          description: |
            Name: `${{ inputs.artifactName }}`
            Version: `${{ needs.plan.outputs.version }}`
            [Rebuild](${{ github.server_url }}/${{ github.repository }}/actions/workflows/release.yaml)
          nodetail: true
          title: Chart build failed
          username: GitHub Actions
          url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
