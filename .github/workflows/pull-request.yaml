---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Pull Request

on:
  merge_group:
  pull_request:

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get Changed Files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: apps/**/metadata.yaml

  changed:
    if: ${{ needs.prepare.outputs.changed-files != '[]' }}
    needs:
      - "prepare"
    name: Get Changed Apps
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      apps: ${{ steps.apps.outputs.apps }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Extract App Values
        id: apps
        run: |
          apps=$(yq eval-all --indent=0 --output-format=json "[.]" ${{ join(fromJSON(needs.prepare.outputs.changed-files), ' ') }})
          echo "apps=${apps}" >> $GITHUB_OUTPUT

  build:
    if: ${{ needs.changed.outputs.apps != '[]' }}
    needs:
      - "changed"
    name: Build ${{ matrix.app.artifactName }}
    uses: ./.github/workflows/app-builder.yaml
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        app: ${{ fromJSON(needs.changed.outputs.apps) }}
      fail-fast: false
      max-parallel: 4
    with:
      artifactName: ${{ matrix.app.artifactName }}
      source: ${{ toJSON(matrix.app.source) }}
      release: false

  status:
    if: ${{ !cancelled() }}
    needs:
      - "build"
    name: Build Success
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"
